<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tagesschau</title>
    <style>
        body { 
            background: #000; 
            color: #000; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }
        #menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        .video-btn { 
            font-size: 1.1rem; 
            padding: 15px 20px; 
            cursor: pointer; 
            background: #ffffff; 
            color: #000000; 
            border: 3px solid #000000; 
            border-radius: 8px; 
            font-weight: bold;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            width: 200px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-wrap: break-word;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .video-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
        }
        .video-btn:active { 
            background: #e0e0e0;
            transform: scale(0.98);
        }
        .video-btn:focus {
            outline: 4px solid #ffcc00;
            outline-offset: 2px;
        }
        .video-btn.featured {
            background: #e74c3c;
            color: #ffffff;
        }
        .video-btn.featured:hover {
            background: #c0392b;
        }
        .video-btn.featured:active {
            background: #a93226;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            max-width: 1000px;
            margin: 0 auto;
            border: 3px solid #ffffff;
            border-radius: 8px;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        h2 {
            color: #ffffff;
            font-size: 1.5rem;
            margin: 0 0 30px 0;
        }
    </style>
</head>
<body>

    <h2>Tagesschau - Aktuelle Videos</h2>

    <div id="menu">
        <h2>Lade Videos...</h2>
    </div>

    <div class="video-wrapper">
        <div id="player"></div>
    </div>

    <script>
        var player;
        
        // 1. YouTube API asynchron laden
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                playerVars: {
                    'autoplay': 1,
                    'controls': 1, 
                    'modestbranding': 1,
                    'rel': 0
                },
                events: {
                    'onReady': fetchVideos, // Wenn Player bereit, lade Videos
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // 2. Neueste Videos über rss2json holen
        function fetchVideos() {
            // Tagesschau YouTube Channel ID: UC5NOEUbkLheQcaaRldYW5GA
            const rssUrl = encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=UC5NOEUbkLheQcaaRldYW5GA');
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    const menu = document.getElementById('menu');
                    menu.innerHTML = ''; // "Lade Videos..." entfernen

                    let count = 0;

                    data.items.forEach(item => {
                        if (count >= 4) return; // Nur 4 Buttons

                        // YouTube Video ID aus dem Link extrahieren
                        const videoId = item.link.split('v=')[1];

                        // Button erstellen
                        const btn = document.createElement('button');
                        btn.className = 'video-btn';
                        btn.innerText = item.title;
                        btn.title = item.title; // Tooltip mit vollem Titel
                        btn.onclick = () => loadVideo(videoId);
                        btn.setAttribute('aria-label', `Video: ${item.title}`);

                        // Farbe ändern wenn "Tagesschau" oder "Tagesthemen" im Titel vorkommt
                        const titleLower = item.title.toLowerCase();
                        if (titleLower.includes('tagesschau') || titleLower.includes('tagesthemen')) {
                            btn.classList.add('featured');
                            btn.setAttribute('aria-label', `Tagesschau-Highlight: ${item.title}`);
                        }

                        menu.appendChild(btn);
                        count++;
                    });
                })
                .catch(error => {
                    document.getElementById('menu').innerHTML = '<h2>Fehler beim Laden. Bitte Seite neu laden.</h2>';
                    console.error("Fehler:", error);
                });
        }

        function loadVideo(videoId) {
            if(player && player.loadVideoById) {
                player.loadVideoById(videoId);
            }
        }

        function onPlayerStateChange(event) {
            // Setzt die Geschwindigkeit hart auf 0.75, wenn das Video abspielt
            if (event.data == YT.PlayerState.PLAYING) {
                event.target.setPlaybackRate(0.75);
            }
        }
    </script>
</body>
</html>
